<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Urban DZ | تسوق الآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff9d;
            --dark: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
        }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .back-link { color: var(--text); text-decoration: none; display: block; margin-bottom: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333;
        }

        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .price { color: var(--primary); font-size: 1.2rem; font-weight: bold; margin: 10px 0; }

        .buy-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">⬅ الرجوع للرئيسية</a>
    <div class="header">
        <h1>🛍️ جميع المنتجات</h1>
    </div>

    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1520974735194-44b5d7dc0b3b" alt="Hoodie">
            <h3>هودي Urban كلاسيك</h3>
            <p class="price">4500 دج</p>
            <button class="buy-btn" onclick="order('هودي Urban كلاسيك', 4500)">شراء الآن</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246" alt="Pants">
            <h3>بنطال واسع</h3>
            <p class="price">3800 دج</p>
            <button class="buy-btn" onclick="order('بنطال واسع', 3800)">شراء الآن</button>
        </div>
    </div>

    <script>
        function order(product, price){
            let phone = "213XXXXXXXXX"; // ضع رقم هاتفك هنا
            let message = `مرحباً، أريد طلب: ${product} بسعر ${price} دج.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
