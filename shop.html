<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Urban DZ | المنتجات</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: auto; }
        .card { background: #161616; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .price { color: #00ff9d; font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .buy-btn { background: #00ff9d; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>منتجات Urban DZ</h1>
    <div class="grid">
        <div class="card">
            <img src="images/12f09fb0d69cc48b1524f6d3bf8caab2.jpg" alt="منتج">
            <p class="price">4500 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 1', 4500)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/1776760694605.png" alt="منتج">
            <p class="price">3000 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 2', 3000)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/34f69334ae9678325b0f2e81120417e9.jpg" alt="منتج">
            <p class="price">3800 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 3', 3800)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/6b8928a16d0de61fd3f61f15b06c9c65.jpg" alt="منتج">
            <p class="price">4000 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 4', 4000)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/823039fe5e5030e66798f11e69823ee0.jpg" alt="منتج">
            <p class="price">3500 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 5', 3500)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/9b0681c634d72d8ab880fd4091dba21a.jpg" alt="منتج">
            <p class="price">5000 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 6', 5000)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/e906a4192df53b015be23eca79dcf1ed.jpg" alt="منتج">
            <p class="price">4200 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 7', 4200)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/f13d461a52de34f9b012cc64366238bf.jpg" alt="منتج">
            <p class="price">3900 دج</p>
            <button class="buy-btn" onclick="openOrderForm('المنتج 8', 3900)">طلب الآن</button>
        </div>
    </div>

    <script>
        function openOrderForm(productName, price) {
            let name = prompt("الاسم واللقب:");
            let phone = prompt("رقم الهاتف:");
            let state = prompt("الولاية:");
            let quantity = prompt("عدد القطع:");

            if (name && phone && state && quantity) {
                let message = `طلب جديد!%0Aالمنتج: ${productName}%0Aالسعر: ${price} دج%0Aالزبون: ${name}%0Aالهاتف: ${phone}%0Aالولاية: ${state}%0Aالعدد: ${quantity}`;
                window.open(`https://wa.me/213559049058?text=${message}`, '_blank');
            } else {
                alert("يرجى ملء جميع المعلومات!");
            }
        }
    </script>
</body>
</html>
