<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Urban DZ | المنتجات</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #00ff9d; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; margin: auto; }
        .card { background: #161616; padding: 15px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00ff9d; }
        img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .p-name { font-weight: bold; margin: 5px 0; }
        .price { color: #00ff9d; font-size: 1.1rem; margin-bottom: 10px; }
        .buy-btn { background: #00ff9d; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>مجموعتنا الجديدة</h1>
    <div class="grid">
        <div class="card">
            <img src="images/12f09fb0d69cc48b1524f6d3bf8caab2.jpg" alt="منتج">
            <p class="p-name">Urban Hoodie V1</p>
            <p class="price">4500 دج</p>
            <button class="buy-btn" onclick="openOrderForm('Urban Hoodie V1', 4500)">طلب الآن</button>
        </div>
        </div>

    <script>
        function openOrderForm(productName, price) {
            let name = prompt("الاسم واللقب:");
            if (!name) return;
            let phone = prompt("رقم الهاتف:");
            let state = prompt("الولاية:");
            let quantity = prompt("عدد القطع:");

            if (name && phone && state && quantity) {
                let message = `🛒 طلب جديد من Urban DZ%0A%0Aالمنتج: ${productName}%0Aالسعر: ${price} دج%0Aالزبون: ${name}%0Aالهاتف: ${phone}%0Aالولاية: ${state}%0Aالكمية: ${quantity}`;
                window.open(`https://wa.me/213559049058?text=${message}`, '_blank');
            }
        }
    </script>
</body>
</html>
