<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | SHADOWLACE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">SHADOWLACE</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="shop.html">المتجر</a></li>
            <li><a href="index.html#about">عن الماركة</a></li>
        </ul>
        <div class="cart-icon">
            <a href="checkout.html"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a>
        </div>
    </nav>

    <main class="shop-container">
        <h1 class="section-title">تشكيلة الملابس</h1>
        
        <div class="products-grid">
            <!-- Product 1 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Shadow Hoodie">
                <h3>هودي Shadowlace الأصلي</h3>
                <p class="price">4500 د.ج</p>
                <button class="btn-add" onclick="addToCart('هودي Shadowlace الأصلي', 4500)">إضافة إلى السلة</button>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Dark T-Shirt">
                <h3>تيشيرت Dark Bold</h3>
                <p class="price">2500 د.ج</p>
                <button class="btn-add" onclick="addToCart('تيشيرت Dark Bold', 2500)">إضافة إلى السلة</button>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Oversized Sweater">
                <h3>سويتر Oversized</h3>
                <p class="price">3800 د.ج</p>
                <button class="btn-add" onclick="addToCart('سويتر Oversized', 3800)">إضافة إلى السلة</button>
            </div>

            <!-- Product 4 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Urban Jacket">
                <h3>جاكيت Urban Mystery</h3>
                <p class="price">7200 د.ج</p>
                <button class="btn-add" onclick="addToCart('جاكيت Urban Mystery', 7200)">إضافة إلى السلة</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="checkout.html" class="btn-primary">إتمام الطلب الآن</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SHADOWLACE. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
