<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Urban DZ | تسوق الآن</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Tajawal', sans-serif; padding: 20px; }
        h1 { text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: auto; }
        .card { background: #161616; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .price { color: #00ff9d; font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .buy-btn { background: #00ff9d; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>منتجات Urban DZ</h1>
    <div class="grid">
        <div class="card">
            <img src="images/12f09fb0d69cc48b1524f6d3bf8caab2.jpg" alt="منتج">
            <p class="price">4500 دج</p>
            <button class="buy-btn" onclick="openOrderForm('هودي كلاسيك', 4500)">طلب الآن</button>
        </div>
        <div class="card">
            <img src="images/34f69334ae9678325b0f2e81120417e9.jpg" alt="منتج">
            <p class="price">3800 دج</p>
            <button class="buy-btn" onclick="openOrderForm('بنطال Urban', 3800)">طلب الآن</button>
        </div>
    </div>

    <script>
        function openOrderForm(productName, price) {
            let name = prompt("الاسم واللقب:");
            let phone = prompt("رقم الهاتف:");
            let state = prompt("الولاية:");
            let quantity = prompt("عدد القطع:");

            if (name && phone && state && quantity) {
                let message = `طلب جديد!
                المنتج: ${productName}
                السعر: ${price} دج
                الزبون: ${name}
                الهاتف: ${phone}
                الولاية: ${state}
                العدد: ${quantity}`;
                
                window.open(`https://wa.me/213559049058?text=${encodeURIComponent(message)}`, '_blank');
            } else {
                alert("يرجى ملء جميع المعلومات لإتمام الطلب!");
            }
        }
    </script>
</body>
</html>
