<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban DZ | المتجر الرئيسي للملابس العصرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%); 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden;
        }

        /* Header */
        .header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: rgba(10,10,10,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            padding: 1rem 0;
            transition: all 0.3s ease;
        }
        .nav { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 2rem;
        }
        .logo { 
            font-size: 1.8rem; 
            font-weight: 700; 
            background: linear-gradient(45deg, #00ff9d, #00d4ff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s ease; 
        }
        .nav-links a:hover { color: #00ff9d; }

        /* Hero Section */
        .hero { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 0 2rem;
            position: relative;
        }
        .hero::before {
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><defs><radialGradient id="a" cx="50%" cy="50%"><stop offset="0%" stop-color="%2300ff9d" stop-opacity="0.1"/><stop offset="100%" stop-color="%2300d4ff" stop-opacity="0.05"/></radialGradient></defs><rect width="100%" height="100%" fill="url(%23a)"/></svg>'); 
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        
        .hero-content { position: relative; z-index: 2; }
        .logo-img { 
            max-width: 280px; 
            border-radius: 25px; 
            border: 3px solid transparent; 
            background: linear-gradient(45deg, #00ff9d, #00d4ff) border-box;
            box-shadow: 0 20px 40px rgba(0,255,157,0.3);
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .hero h1 { 
            font-size: clamp(2.5rem, 5vw, 4rem); 
            margin-bottom: 1rem; 
            background: linear-gradient(45deg, #fff, #00ff9d); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .hero p { 
            font-size: 1.3rem; 
            margin-bottom: 2.5rem; 
            opacity: 0.9; 
            max-width: 600px;
        }
