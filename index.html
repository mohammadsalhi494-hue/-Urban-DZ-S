<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban DZ | متجر الملابس</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #d2a679, #2b1d1d);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
    padding:30px;
    max-width:600px;
    background: rgba(0,0,0,0.35);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    line-height:1.6;
    opacity:0.9;
}

.btn{
    margin-top:20px;
    display:inline-block;
    padding:15px 30px;
    background:#d2a679;
    color:#2b1d1d;
    text-decoration:none;
    font-weight:bold;
    border-radius:12px;
    transition:0.3s;
}

.btn:hover{
    background:white;
    color:#2b1d1d;
    transform:scale(1.05);
}

.features{
    margin-top:20px;
    text-align:right;
    font-size:16px;
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

    <h1>🛍️ Urban DZ</h1>
    <p>مرحباً بك في متجر الملابس الفخم</p>
    <p>أحدث صيحات الموضة بأسعار مناسبة وجودة عالية</p>

    <div class="features">
        ✔ ملابس عصرية رجالية ونسائية<br>
        ✔ جودة عالية وسعر مناسب<br>
        ✔ توصيل سريع داخل الجزائر<br>
        ✔ الدفع عند الاستلام
    </div>

    <a class="btn" href="shop.html">تصفح المتجر</a>

</div>

</body>
</html>
